<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WW Resonators Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 1rem;
            background: #0f0f12;
            font-family: system-ui, sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }

        .card {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .card img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        .card.unowned {
            filter: grayscale(100%) brightness(0.6);
            transform: scale(1);
        }

        .card.owned {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.08);
        }

        @media (min-width: 768px) {
            #grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>

<h1>Resonators</h1>
<div id="grid"></div>

<script src="resonators.js"></script>

</body>
</html>
